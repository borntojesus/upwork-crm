  """
  A human-understandable string that is used as the last of URLs built to refer the given entity.
  Example: 'accounting-consulting' (for 'Accounting & Consulting' category)
  """
  slug: String

  """
  A semantic identifier that uniquely identifies an ontology element.
  Its value doesn't depend on the environment, unlike a UID identifier.
  Example: upwork:AdministrationSoftware
  """
  ontologyId: String

  """
  A list of simplified 'subcategory' entities which ara children of the given category
  """
  subcategories: [OntologySubcategory!]!

  """
  A list of simplified 'service' entities which descendants (indirect children) of the given category -
  or, put another way, a list of all 'services' whose top parent is the current 'category'
  """
  services: [OntologyService!]!
}

""" Ontology connection"""
