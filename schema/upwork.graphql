"""Defines possible subscription transition scenarios."""
enum TransitionScenarioEnum {
  """Default or unknown transition scenario."""
  UNDEFINED

  """Subscription upgraded to a higher plan."""
  UPGRADE

  """A future subscription change has been scheduled."""
  SCHEDULE

  """Subscription reached its natural expiration."""
  EXPIRE

  """Cancellation occurred while a downgrade was still pending."""
  CANCEL_PENDING_DOWNGRADE

  """Subscription was explicitly cancelled by the client."""
  CLIENT_SUBSCRIPTION_CANCELLED

  """One-time purchase of additional ad-hoc connects."""
  AD_HOC_CONNECTS_PURCHASE

  """Duplicate subscription was detected and removed."""
  DUPLICATE_SUBSCRIPTION_REMOVED

  """Subscription expired without ever being renewed."""
  NEVER_RENEWED_SUBSCRIPTION_EXPIRED

  """Subscription expired due to the organization being inactive."""
  INACTIVE_ORGANIZATION_SUBSCRIPTION_EXPIRED

  """Apple IAP subscription was created."""
  APPLE_IAP__CREATE

  """Apple IAP subscription was upgraded."""
  APPLE_IAP__UPGRADE

  """Apple IAP upgrade processed out of chronological order."""
  APPLE_IAP__UPGRADE__OUT_OF_ORDER

  """Apple IAP subscription renewal processed."""
  APPLE_IAP__RENEWAL

  """Apple IAP renewal where cancellation is scheduled for the future."""
  APPLE_IAP__RENEWAL__CANCELLATION_FUTURE

  """Apple IAP auto-renew was turned off and took effect immediately."""
  APPLE_IAP__RENEWAL__AUTO_RENEW_DROP_OFF_IMMEDIATE

  """Apple IAP renewal processed out of order."""
  APPLE_IAP__RENEWAL__OUT_OF_ORDER

  """Apple IAP renewal replaced an existing non-IAP subscription."""
  APPLE_IAP__RENEWAL__REPLACE_NON_IAP

  """Apple IAP subscription cancelled with immediate effect."""
  APPLE_IAP__CANCELLATION_IMMEDIATE

  """Apple IAP future cancellation after renewal already processed."""
  APPLE_IAP__CANCELLATION_FUTURE__RENEWAL_ALREADY_PROCESSED

  """Apple IAP immediate cancellation after renewal already processed."""
  APPLE_IAP__CANCELLATION_IMMEDIATE__RENEWAL_ALREADY_PROCESSED

  """Apple IAP auto-renew disabled effective in the future."""
  APPLE_IAP__AUTO_RENEW_DROP_OFF_FUTURE

  """Apple IAP auto-renew drop-off processed out of order."""
  APPLE_IAP__AUTO_RENEW_DROP_OFF__OUT_OF_ORDER

  """Apple IAP future auto-renew drop-off after renewal already processed."""
  APPLE_IAP__AUTO_RENEW_DROP_OFF_FUTURE__RENEWAL_ALREADY_PROCESSED

  """Apple IAP auto-renew recovery processed out of order."""
  APPLE_IAP__AUTO_RENEW_RECOVERY__OUT_OF_ORDER

  """Apple IAP auto-renew recovery after renewal already processed."""
  APPLE_IAP__AUTO_RENEW_RECOVERY__RENEWAL_ALREADY_PROCESSED

  """System-initiated cleanup after subscription expiry."""
  CLEAN_UP_EXPIRY

  """Subscription migrated from another system or plan."""
  MIGRATION

  """
  Apple IAP immediate auto-renew drop-off after renewal already processed.
  """
  APPLE_IAP__AUTO_RENEW_DROP_OFF_IMMEDIATE__RENEWAL_ALREADY_PROCESSED

  """Pause scheduled to start at a future time."""
  SCHEDULE_PAUSE

  """Existing pause duration was extended."""
  EXTEND_PAUSE

  """Subscription was paused immediately."""
  PAUSE

  """Pause cancelled while a pause request was still pending."""
  CANCEL_PENDING_PAUSE

  """Subscription resumed while still in a paused state."""
  RESUME_DURING_PAUSE

  """Subscription resumed from pause."""
  RESUME

  """Downgrade requested while pause is pending."""
  DOWNGRADE_WHILE_PAUSE_PENDING

  """Downgrade applied while subscription is paused."""
  DOWNGRADE_WHILE_PAUSED

  """Subscription state was reset to a clean baseline."""
  SUBSCRIPTION_STATE_RESET

  """Subscription renewed for a new billing period."""
  RENEW
}

