  status of element to search, one of OntologyEntityStatus default ACTIVE
  """
  entityStatus_eq: OntologyEntityStatus = ACTIVE

  """
  optional parameter to specify ordering of results. If no value provided ordering is random.
  
  'alphabet' to order results alphabetically by prefLabel
  'match-start' (Default) to order results by index of filter string in prefLabel. I.e. results starting with filter will appear first
  """
  sortOrder: String = "match-start"

  """Max number of responses. 10 by default"""
  limit: Int = 10

  """if true, it includes attribute group nodes. Default: false."""
  includeAttributeGroups: Boolean = false
}

"""
  An ontology is a set of concepts and categories in a domain that shows their properties and the relations between them.

  Conceptually, the ontology is a "knowledge graph".

  Currently the ontology model describes Occupations, Skills, Deliverables and Descriptors.

  However, ONLY Occupations and Skills are supported. Deliverables and Deliverable Descriptors are currently supported as Skills, forming what we refer to as
Attributes.

  Occupations describe what we know, in the Upwork universe, as Categories, Subcategories and Services or L1s, L2s and L3s.
"""
interface OntologyEntity {
  id: ID!

  """
  ontologyId is a semantic identifier that unqiuely identifies an ontology element
  
  Its value doesn't depend on the environment (same for dev, staging, prod)
  
  Example: upwork:AdministrationSoftware
  """
  ontologyId: String!
  type: [OntologyEntityType]!

  """
  Defines the status of an occupation.
    - Active: Skill is active and available for use
    - Deprecated: Skill has been deprecated
    - Pending: Skill has been created recently and is not active yet
  """
  entityStatus: OntologyEntityStatus!

  """
  Defines the label of the entity that is displayed across Upwork. It must be a unique value.
  """
  preferredLabel: String!
  definition: String

  """
  Defines (when available) the date (timestamp) of creation for the entity.
  """
  createdDateTime: String

  """
  Defines (when available) the date (timestamp) of update for the entity.
  """
  modifiedDateTime: String
}

""" Ontology entity"""
type OntologyEntityEdge {
  """The ontology entity at this edge"""
  node: OntologyEntity!

  """Cursor for pagination"""
  cursor: String!
}

""" Filter for searching ontology entities by label and type"""
input OntologyEntityFilter {
  """ Search string for preferred label field (up to 100 characters)"""
  preferredLabel_any: String!

  """ Entity type to filter by"""
  type: OntologyEntityType

  """ Taxonomy level to filter by"""
  taxonomyLevel: OntologyEntityTaxonomyLevel

  """ Entity status filter (defaults to ACTIVE)"""
  entityStatus_eq: OntologyEntityStatus = ACTIVE

  """ Sort order for results (defaults to RANDOM)"""
  sortOrder: OntologyResultSortOrder = RANDOM

  """ Maximum number of results to return"""
  limit: Int
}

union OntologyEntityResult = Skill | Occupation

""" Filter for searching ontology entities by their ontology IDs"""
input OntologyEntitySearchFilter {
  """ List of ontology IDs to search for"""
  ontologyIds_any: [ID!]!
}

