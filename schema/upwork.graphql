enum OntologyEntityStatus {
  """ Skill is active and available for use"""
  ACTIVE

  """ Skill has been deprecated"""
  DEPRECATED

  """ Skill has been created recently and is not yet active"""
  PENDING
}

""" Hierarchy level in the ontology taxonomy"""
enum OntologyEntityTaxonomyLevel {
  """ Top-level category"""
  CATEGORY

  """ Second-level subcategory"""
  SUBCATEGORY

  """ Third-level service"""
  SERVICE

  """ Fourth-level specialization"""
  SPECIALIZATION
}

""" Supported ontology entity types"""
enum OntologyEntityType {
  """ Occupation or job role"""
  OCCUPATION

  """ Skill or competency"""
  SKILL

  """ Deliverable or work product"""
  DELIVERABLE

  """ Deliverable descriptor attribute"""
  DELIVERABLE_DESCRIPTOR

  """ Catalog attribute group"""
  CATALOG_ATTRIBUTE_GROUP

  """ Catalog category"""
  CATALOG_CATEGORY

  """ Catalog specification"""
  CATALOG_SPECIFICATION

  """ Catalog package spec"""
  CATALOG_PACKAGE_SPEC

  """ Catalog project spec"""
  CATALOG_PROJECT_SPEC

  """ Catalog spec choice"""
  CATALOG_SPEC_CHOICE

  """ Role concept (matches TOntologyConceptType.ROLE = 11)"""
  ROLE
}

