  """Account Security context (code: 1)"""
  AS

  """Scam context (code: 2)"""
  SCAM

  """Circumvention context (code: 3)"""
  CIRC

  """Payment Enforcement context (code: 4)"""
  CE

  """Invitation Fraud and Circumvention Rules context (code: 5)"""
  IFCR

  """Pay Risk (code: 6)"""
  PAYRISK
}

"""Single filter criteria"""
input TnsRuleFilter {
  """ Field to filter by"""
  field: TnsRuleFilterField!

  """ Operator to apply"""
  operator: TnsRuleFilterOperator!

  """ Value to compare (comma-separated for IN/NOT_IN)"""
  value: String!
}

"""Fields that can be used for filtering rules"""
enum TnsRuleFilterField {
  """Filter by rule ID"""
  ID

  """Filter by rule expression"""
  RULE_EXPRESSION

  """Filter by rule status"""
  STATUS

  """Filter by attribute numeric ID"""
  ATTRIBUTE_ID

  """Deprecated: use ATTRIBUTE_ID instead"""
  ATTRIBUTE_TYPE @deprecated(reason: "Use ATTRIBUTE_ID (numeric) instead")

  """Filter by reason ID"""
  REASON_ID

  """Filter by creation timestamp in milliseconds"""
  CREATED_AT_MS

  """Filter by last update timestamp in milliseconds"""
  UPDATED_AT_MS

  """Filter by creator user identifier"""
  CREATED_BY

  """Filter by last updater user identifier"""
  UPDATED_BY

  """Filter by number of matches"""
  MATCH_COUNT

  """Filter by last matched timestamp in milliseconds"""
  LAST_MATCHED_AT_MS

  """Filter by time to review in milliseconds"""
  TIME_TO_REVIEW_MS

  """Filter by note text"""
  NOTE
}

"""
Operators that can be used for filtering rules. CONTAINS is case-insensitive for string fields
"""
enum TnsRuleFilterOperator {
  EQUALS
  CONTAINS
  GREATER_THAN
  GREATER_THAN_OR_EQUAL
  LESS_THAN
  LESS_THAN_OR_EQUAL
}

"""Filter request aggregating multiple filters (AND logic)"""
input TnsRuleFilterRequest {
  """ Array of filters to apply (AND logic)"""
  filters: [TnsRuleFilter!]!
}

"""Fields that can be used for sorting rules"""
enum TnsRuleSortField {
  ID
  RULE_EXPRESSION
  STATUS
  ATTRIBUTE_TYPE
  REASON_ID
  CREATED_AT_MS
  UPDATED_AT_MS
  CREATED_BY
  UPDATED_BY
  MATCH_COUNT
  LAST_MATCHED_AT_MS
  TIME_TO_REVIEW_MS
  NOTE
}

"""Sort request with field and direction"""
input TnsRuleSortRequest {
  """ Field to sort by"""
  field: TnsRuleSortField!

  """ Sort direction"""
  direction: SortDirection!
}

"""Status of a rule"""
enum TnsRuleStatus {
  """Rule is in draft state (code: 0)"""
  DRAFT

  """Rule is active and will be evaluated (code: 1)"""
  ACTIVE

  """Rule is temporarily disabled (code: 2)"""
  DEACTIVATED

  """Rule is marked as deleted (code: 3)"""
  DELETED
}

"""
Input for rule structure - polymorphic type representing either a leaf node or group node
Type field determines which fields are used
"""
input TnsRuleStructureInput {
  """Type of node: 'rule' for leaf or 'group' for group node"""
  type: String!

  """For leaf nodes: attribute type code (1-9)"""
  attributeType: Int

  """
  For leaf nodes: rule operator code (1=CONTAINS, 2=EQUALS, 3=STARTS_WITH, 4=ENDS_WITH, 5=MATCHES_REGEX, 6=NOT_CONTAINS, 7=NOT_EQUALS)
  """
  ruleOperator: Int

  """For leaf nodes: value to compare against"""
  value: String

  """For group nodes: merging operator code (1=AND, 2=OR)"""
  mergingOperator: Int

  """For group nodes: child rules"""
  children: [TnsRuleStructureInput!]
}

