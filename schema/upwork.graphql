  createdDateTime: String

  """ First contract start timestamp"""
  firstContractStartDateTime: String

  """ Last modification timestamp"""
  modifiedDateTime: String

  """ Contract start timestamp"""
  startDateTime: String

  """ Contract end timestamp"""
  endDateTime: String

  """ Whether manual time logging is allowed"""
  manualTimeAllowed: Boolean

  """ Whether screenshots are hidden"""
  hideScreenshots: Boolean @deprecated(reason: "Will be removed in future release")

  """ Whether this is the last contract term"""
  last: Boolean

  """ Weekly stipend hours"""
  weeklyStipendHours: Float

  """ Estimated engagement duration"""
  estimatedDuration: ProposalEngagementDuration @deprecated(reason: "Will be removed in future release")

  """ Current contract status"""
  status: ContractState

