enum MilestoneProposalGroup {
  """
  This type indicates a proposal can only contain changes for future milestones
  and go through future milestones flow (default)
  """
  FUTURE

  """
  This type indicates a proposal can only contain changes for active milestone(s)
  and go through active milestones flow
  """
  ACTIVE

  """
  This is a special type to submit replacements for proposals in ACTIVE group.
  A proposal started and submitted in this group will withdraw an existing proposal in ACTIVE group
  and will "become" a new ACTIVE proposal
