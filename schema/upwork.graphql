Account health status enumeration
@Example:
query CheckAccountHealth {
    accountHealthStatus
}
@Example:
query GetHealthBasedActions {
    accountHealthStatus
    accountHealthRestrictions {
        accountAccessStatus {
            code
            displayName
        }
        restrictionItems {
            accessRestrictionName
            nextAction {
                actionName
                actionUrl
            }
        }
